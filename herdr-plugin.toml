id = "daniel.scatterer"
name = "Scatterer"
version = "0.1.9"
min_herdr_version = "0.7.0"
description = "Daniel's Herdr workflow/layout plugin."
platforms = ["macos", "linux"]

[[build]]
command = ["cargo", "build", "--release"]
platforms = ["macos", "linux"]

[[actions]]
id = "apply-layout"
title = "Apply Scatterer layout"
description = "Create a new workspace with the default Scatterer layout."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "apply-layout"]

[[actions]]
id = "quick-start"
title = "Quick start Pi workspace"
description = "Open a workspace or worktree, optionally switch/create a branch from a base ref, apply the Scatterer layout, and optionally start Pi with a prompt."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "open-quick-start"]

[[actions]]
id = "pr-picker"
title = "PR picker"
description = "Show PRs associated with active Herdr agents and focus their workspaces."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "open-pr-picker"]

[[actions]]
id = "lazygit"
title = "Lazygit"
description = "Open lazygit for the focused pane's cwd in a Herdr overlay."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "open-lazygit"]

[[actions]]
id = "appearance-sync"
title = "Sync appearance to Pi panes"
description = "macOS-only temporary bridge that sends the current light/dark appearance to Pi child panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "appearance", "sync"]

[[actions]]
id = "appearance-install-launchd"
title = "Install macOS appearance watcher"
description = "Install a LaunchAgent that syncs macOS light/dark changes to Pi child panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "appearance", "install-launchd"]

[[actions]]
id = "appearance-uninstall-launchd"
title = "Uninstall macOS appearance watcher"
description = "Remove the Scatterer LaunchAgent that syncs macOS light/dark changes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "appearance", "uninstall-launchd"]

[[actions]]
id = "nav-left"
title = "Navigate left (Vim/Herdr)"
description = "Move left across Vim/Neovim splits and Herdr panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "nav", "left"]

[[actions]]
id = "nav-down"
title = "Navigate down (Vim/Herdr)"
description = "Move down across Vim/Neovim splits and Herdr panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "nav", "down"]

[[actions]]
id = "nav-up"
title = "Navigate up (Vim/Herdr)"
description = "Move up across Vim/Neovim splits and Herdr panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "nav", "up"]

[[actions]]
id = "nav-right"
title = "Navigate right (Vim/Herdr)"
description = "Move right across Vim/Neovim splits and Herdr panes."
contexts = ["global"]
command = ["bash", "scripts/scatterer.sh", "nav", "right"]

[[panes]]
id = "quick-start"
title = "Quick start"
placement = "overlay"
command = ["bash", "scripts/scatterer.sh", "quick-start"]

[[panes]]
id = "pr-picker"
title = "PRs"
placement = "overlay"
command = ["bash", "scripts/scatterer.sh", "pr-picker"]

[[panes]]
id = "lazygit"
title = "Lazygit"
placement = "overlay"
command = ["bash", "scripts/scatterer.sh", "lazygit"]
